<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Claude7 icon: inverse of the official Claude mark — orange burst on white. -->
  <rect width="1024" height="1024" fill="#FFFFFF"/>
  <g fill="#D97757">
    <!-- long spokes -->
    <rect x="497" y="212" width="30" height="234" rx="15" transform="rotate(0 512 512)"/>
    <rect x="497" y="212" width="30" height="234" rx="15" transform="rotate(60 512 512)"/>
    <rect x="497" y="212" width="30" height="234" rx="15" transform="rotate(120 512 512)"/>
    <rect x="497" y="212" width="30" height="234" rx="15" transform="rotate(180 512 512)"/>
    <rect x="497" y="212" width="30" height="234" rx="15" transform="rotate(240 512 512)"/>
    <rect x="497" y="212" width="30" height="234" rx="15" transform="rotate(300 512 512)"/>
    <!-- short spokes -->
    <rect x="499" y="277" width="26" height="169" rx="13" transform="rotate(30 512 512)"/>
    <rect x="499" y="277" width="26" height="169" rx="13" transform="rotate(90 512 512)"/>
    <rect x="499" y="277" width="26" height="169" rx="13" transform="rotate(150 512 512)"/>
    <rect x="499" y="277" width="26" height="169" rx="13" transform="rotate(210 512 512)"/>
    <rect x="499" y="277" width="26" height="169" rx="13" transform="rotate(270 512 512)"/>
    <rect x="499" y="277" width="26" height="169" rx="13" transform="rotate(330 512 512)"/>
  </g>
</svg>
